# ═══════════════════════════════════════════════════════════════
# CS 308 Online Store — Docker Compose
#
# Start everything:  docker-compose up -d
# Logs:              docker-compose logs -f backend
# Stop:              docker-compose down
# Reset DB:          docker-compose down -v
# ═══════════════════════════════════════════════════════════════

version: "3.9"

services:
  # ── PostgreSQL Database ───────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: store_user
      POSTGRES_PASSWORD: store_pass
      POSTGRES_DB: store_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U store_user -d store_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Rust Backend (Axum + Tera + HTMX) ────────────────────
  backend:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://store_user:store_pass@db:5432/store_db
      JWT_SECRET: change-me-to-a-random-secret-in-production
      JWT_EXPIRY_HOURS: 24
      RUST_LOG: info
      HOST: 0.0.0.0
      PORT: 8080
      SMTP_HOST: localhost
      SMTP_PORT: 587
      SMTP_FROM: noreply@store.local
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: